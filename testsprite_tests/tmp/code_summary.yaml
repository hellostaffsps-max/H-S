version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js (App Router)
  - Supabase
  - PostgreSQL
  - Tailwind CSS
features:
  - name: Subscriptions Management
    description: Admin dashboard to manage user subscriptions, plans, and payments.
    files:
      - src/app/admin/subscriptions/page.tsx
    endpoints:
      - method: GET
        path: /admin/subscriptions
        description: List all subscriptions
        auth_required: true
      - method: POST
        path: /api/subscriptions/upgrade
        description: Upgrade a user subscription plan
        auth_required: true
  - name: User Management
    description: Admin interface to view, delete, and change roles for platform users.
    files:
      - src/app/admin/users/page.tsx
    endpoints:
      - method: GET
        path: /admin/users
        description: List all users
        auth_required: true
  - name: Articles Management
    description: Content management system for platform articles and blog posts.
    files:
      - src/app/admin/articles/page.tsx
    endpoints:
      - method: GET
        path: /admin/articles
        description: List all articles
        auth_required: true
      - method: POST
        path: /api/articles
        description: Create a new article
        auth_required: true
  - name: Blog
    description: Public facing blog to read articles.
    files:
      - src/app/blog/[slug]/page.tsx
    endpoints:
      - method: GET
        path: /blog/[slug]
        description: View a specific blog post
        auth_required: false
known_limitations:
  - issue: No server-side validation for admin role on API routes
    location: src/app/admin/subscriptions/page.tsx
    impact: Security vulnerability if API endpoints are called directly
